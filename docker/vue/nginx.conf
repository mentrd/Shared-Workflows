server {
    listen       80;
    server_name  localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ────────────────────────────────────────────────────────────
    # All routes are handled by the Vue Router; unknown paths fall back to
    # index.html so that client-side navigation works after a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    # Vite / Vue CLI generates hashed filenames for JS/CSS bundles, so they are
    # safe to cache for a long time.
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|png|jpe?g|gif|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health-check endpoint ──────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/html
        text/plain
        text/xml;
}
