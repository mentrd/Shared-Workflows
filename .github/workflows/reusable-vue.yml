name: Reusable Vue Frontend CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        required: false
        type: string
        default: "20"
      working-directory:
        description: Project working directory
        required: false
        type: string
        default: "."
      install-command:
        description: Command used to install dependencies
        required: false
        type: string
        default: npm ci
      build-command:
        description: Command used to build the project
        required: false
        type: string
        default: npm run build --if-present
      test-command:
        description: Command used to run tests
        required: false
        type: string
        default: npm test --if-present
      run-build:
        description: Whether to execute build step
        required: false
        type: boolean
        default: true
      run-test:
        description: Whether to execute test step
        required: false
        type: boolean
        default: true
      cache-dependency-path:
        description: Lock file path used for npm cache key
        required: false
        type: string
        default: "**/package-lock.json"
      upload-dist:
        description: Whether to upload built artifact
        required: false
        type: boolean
        default: false
      dist-path:
        description: Build output path to upload
        required: false
        type: string
        default: dist
      artifact-name:
        description: Name of uploaded build artifact
        required: false
        type: string
        default: vue-dist

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Build
        if: ${{ inputs.run-build }}
        run: ${{ inputs.build-command }}

      - name: Test
        if: ${{ inputs.run-test }}
        run: ${{ inputs.test-command }}

      - name: Upload dist artifact
        if: ${{ inputs.upload-dist }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory == '.' && inputs.dist-path || format('{0}/{1}', inputs.working-directory, inputs.dist-path) }}
