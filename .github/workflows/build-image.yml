name: Build & Push image to Harbor

on:
  workflow_call:
    inputs:
      harbor_url:
        description: 'Harbor registry URL (e.g. harbor.example.com)'
        required: true
        type: string    
      harbor_project:
        description: 'Harbor project / namespace (e.g. my-org)'
        required: true
        type: string
      image_name:
        description: 'Docker image name (e.g. my-vue-app)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag (defaults to the short commit SHA)'
        required: false
        type: string
        default: ''
      dockerfile_path:
        description: 'Path to the Dockerfile relative to the repository root'
        required: false
        type: string
        default: 'Dockerfile'
      build_context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build_args:
        description: |
          Additional Docker build arguments.
          Provide one argument per line in KEY=VALUE format.
        required: false
        type: string
        default: ''
      environment:
        description: github env
        required: false
        type: string
        default: ''

    secrets:
      harbor_username:
        description: 'Harbor registry username'
        required: true
      harbor_password:
        description: 'Harbor registry password / robot-account token'
        required: true

    outputs:
      image_full_name:
        description: 'Fully-qualified image name pushed to Harbor'
        value: ${{ jobs.build.outputs.image_full_name }}
      image_tag:
        description: 'The image tag that was applied'
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    name: Build & push Docker image
    runs-on: [self-hosted, ment-runner]
    environment: ${{ inputs.environment }}
    
    outputs:
      image_full_name: ${{ steps.meta.outputs.image_full_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: 注入環境變數
        run: echo "${{ vars.env_file }}" > .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::8}"
          fi
          BRANCH="${GITHUB_REF_NAME//\//-}"
          BRANCH_SHA8="${BRANCH}-${GITHUB_SHA::8}"
          IMAGE="${{ inputs.harbor_url }}/${{ inputs.harbor_project }}/${{ inputs.image_name }}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_full_name=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_branch_sha8=${IMAGE}:${BRANCH_SHA8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: '${{ inputs.harbor_url }}'
          username: '${{ secrets.harbor_username }}'
          password: '${{ secrets.harbor_password }}'

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_full_name }}
            ${{ steps.meta.outputs.image_branch_sha8 }}
            ${{ inputs.harbor_url }}/${{ inputs.harbor_project }}/${{ inputs.image_name }}:latest
          build-args: |
            ${{ inputs.build_args }}
          # 從 Harbor 讀取快取
          cache-from: type=registry,ref=${{ inputs.harbor_url }}/${{ inputs.harbor_project }}/${{ inputs.image_name }}:buildcache          
          # 將快取寫入 Harbor (這樣就不會卡在 exporting to GitHub)
          cache-to: type=registry,ref=${{ inputs.harbor_url }}/${{ inputs.harbor_project }}/${{ inputs.image_name }}:buildcache,mode=max
