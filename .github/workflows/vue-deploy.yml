name: Vue – Deploy via SSH

on:
  workflow_call:
    inputs:
      # ── Image / registry settings ───────────────────────────────────────────
      harbor_url:
        description: 'Harbor registry URL (e.g. harbor.example.com)'
        required: true
        type: string
      harbor_project:
        description: 'Harbor project / namespace (e.g. my-org)'
        required: true
        type: string
      image_name:
        description: 'Docker image name (e.g. my-vue-app)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        type: string
        default: 'latest'

      # ── Container runtime settings ──────────────────────────────────────────
      container_name:
        description: 'Name for the running Docker container'
        required: true
        type: string
      host_port:
        description: 'Host port exposed on the server'
        required: false
        type: string
        default: '80'
      container_port:
        description: 'Port exposed inside the container'
        required: false
        type: string
        default: '80'
      env_vars:
        description: |
          Additional environment variables passed to the container.
          Provide one variable per line in KEY=VALUE format.
          Example:
            API_URL=https://api.example.com
            APP_ENV=production
        required: false
        type: string
        default: ''
      docker_run_extra_args:
        description: 'Extra arguments appended to the docker run command'
        required: false
        type: string
        default: ''

      # ── SSH / target host settings ──────────────────────────────────────────
      deploy_hosts:
        description: |
          Comma-separated list of target hostnames or IP addresses.
          Example: "10.0.0.1,10.0.0.2,10.0.0.3"
        required: true
        type: string
      ssh_user:
        description: 'SSH username used to connect to target servers'
        required: false
        type: string
        default: 'deploy'
      ssh_port:
        description: 'SSH port on target servers'
        required: false
        type: string
        default: '22'

    secrets:
      harbor_username:
        description: 'Harbor registry username'
        required: true
      harbor_password:
        description: 'Harbor registry password / robot-account token'
        required: true
      ssh_private_key:
        description: 'PEM-encoded SSH private key for connecting to target servers'
        required: true

jobs:
  deploy:
    name: Deploy to servers
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ssh_private_key }}

      - name: Build deploy metadata
        id: meta
        run: |
          IMAGE="${{ inputs.harbor_url }}/${{ inputs.harbor_project }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # Encode env_vars as base64 so it can be safely transported over SSH
          # (avoids word-splitting and special-character issues)
          ENV_B64=$(printf '%s' "${{ inputs.env_vars }}" | base64 -w 0)
          echo "env_b64=${ENV_B64}" >> "$GITHUB_OUTPUT"

      - name: Deploy to each host
        env:
          IMAGE:          ${{ steps.meta.outputs.image }}
          ENV_B64:        ${{ steps.meta.outputs.env_b64 }}
          HARBOR_URL:     ${{ inputs.harbor_url }}
          HARBOR_USER:    ${{ secrets.harbor_username }}
          HARBOR_PASS:    ${{ secrets.harbor_password }}
          CONTAINER:      ${{ inputs.container_name }}
          HOST_PORT:      ${{ inputs.host_port }}
          CONTAINER_PORT: ${{ inputs.container_port }}
          EXTRA_ARGS:     ${{ inputs.docker_run_extra_args }}
          SSH_USER:       ${{ inputs.ssh_user }}
          SSH_PORT:       ${{ inputs.ssh_port }}
        run: |
          IFS=',' read -ra HOSTS <<< "${{ inputs.deploy_hosts }}"
          for RAW_HOST in "${HOSTS[@]}"; do
            # Trim leading/trailing whitespace using bash parameter expansion
            HOST="${RAW_HOST#"${RAW_HOST%%[! ]*}"}"
            HOST="${HOST%"${HOST##*[! ]}"}"
            echo "──────────────────────────────────────"
            echo "▶ Deploying to ${HOST}"
            echo "──────────────────────────────────────"

            # Add host key to known_hosts (avoid interactive prompt)
            ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null

            # Pass all deployment parameters as environment variables so that
            # special characters and spaces inside values are preserved safely.
            ssh -p "${SSH_PORT}" "${SSH_USER}@${HOST}" \
              "IMAGE='${IMAGE}' \
               ENV_B64='${ENV_B64}' \
               HARBOR_URL='${HARBOR_URL}' \
               HARBOR_USER='${HARBOR_USER}' \
               HARBOR_PASS='${HARBOR_PASS}' \
               CONTAINER='${CONTAINER}' \
               HOST_PORT='${HOST_PORT}' \
               CONTAINER_PORT='${CONTAINER_PORT}' \
               EXTRA_ARGS='${EXTRA_ARGS}' \
               bash -s" << 'REMOTE_SCRIPT'
              set -euo pipefail

              echo "==> Logging in to Harbor registry"
              echo "${HARBOR_PASS}" | docker login "${HARBOR_URL}" \
                -u "${HARBOR_USER}" --password-stdin

              echo "==> Pulling image: ${IMAGE}"
              docker pull "${IMAGE}"

              echo "==> Stopping and removing old container (if exists)"
              docker stop "${CONTAINER}" 2>/dev/null || true
              docker rm   "${CONTAINER}" 2>/dev/null || true

              # Write env vars to a temp file and use --env-file so that
              # values with spaces or special characters are handled safely.
              ENV_FILE=$(mktemp)
              trap 'rm -f "${ENV_FILE}"' EXIT
              printf '%s' "${ENV_B64}" | base64 -d > "${ENV_FILE}"

              echo "==> Starting new container: ${CONTAINER}"
              docker run -d \
                --name "${CONTAINER}" \
                -p "${HOST_PORT}:${CONTAINER_PORT}" \
                --restart unless-stopped \
                --env-file "${ENV_FILE}" \
                ${EXTRA_ARGS} \
                "${IMAGE}"

              echo "==> Pruning unused images"
              docker image prune -f

              echo "==> Deployment successful on $(hostname)"
REMOTE_SCRIPT

            echo "✅ ${HOST} – done"
          done
